<!DOCTYPE html>
<html class="dark" lang="es" style="">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Iniciar Sesión - Fortobs</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Plus+Jakarta+Sans:wght@500;600;700&amp;family=Hanken+Grotesk:wght@600&amp;display=swap"
        rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet">
    <link href="/styles/login.css" rel="stylesheet">
</head>

<body
    class="min-h-screen flex flex-col items-center justify-center relative overflow-hidden font-body-md antialiased selection:bg-primary-container selection:text-on-primary-container">
    <div class="absolute inset-0 pointer-events-none overflow-hidden">
        <div
            class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary-container/5 rounded-full blur-[120px] mix-blend-screen">
        </div>
        <div
            class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-primary-container/5 rounded-full blur-[120px] mix-blend-screen">
        </div>
    </div>
    <main class="w-full max-w-[440px] px-margin-mobile md:px-0 z-10">
        <div class="text-center mb-8 animate-enter opacity-0">
            <h1 class="font-display-lg text-display-lg text-primary-container">Fortobs</h1>
        </div>
        <div
            class="glass-panel rounded-xl p-8 md:p-10 w-full animate-enter opacity-0 delay-100 relative overflow-hidden backdrop-blur-xl shadow-2xl bg-surface-container-lowest/50">
            <div
                class="absolute top-0 left-0 w-full h-24 bg-gradient-to-b from-white/5 to-transparent pointer-events-none">
            </div>
            <div class="text-center mb-8 relative z-10">
                <h2 class="font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface mb-2">Iniciar
                    Sesión</h2>
                <p class="font-body-md text-body-md text-on-surface-variant">Ingresa tus credenciales para acceder al
                    Panel Administrativo</p>
            </div>
            <form action="#" class="space-y-6 relative z-10" method="POST">
                <div class="space-y-2 animate-enter opacity-0 delay-200">
                    <label
                        class="block font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider text-on-surface-variant/80 text-on-surface-variant/70"
                        for="username">Usuario</label>
                    <div class="relative">
                        <span
                            class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant/50">person</span>
                        <input
                            class="input-field w-full rounded-lg py-3 pl-10 pr-4 font-body-md text-body-md bg-surface-container-low border-outline-variant/30 placeholder:text-on-surface-variant/50 bg-surface-container-high/50 focus:border-primary focus:ring-1 focus:ring-primary/30"
                            id="username" maxlength="50" minlength="3" name="username" placeholder="Nombre de usuario"
                            required="" type="text">
                    </div>
                </div>
                <div class="space-y-2 animate-enter opacity-0 delay-300">
                    <div class="flex justify-between items-center">
                        <label
                            class="block font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider text-on-surface-variant/80 text-on-surface-variant/70"
                            for="password">Contraseña</label>

                    </div>
                    <div class="relative">
                        <span
                            class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant/50">lock</span>
                        <input
                            class="input-field w-full rounded-lg py-3 pl-10 pr-10 font-body-md text-body-md bg-surface-container-low border-outline-variant/30 placeholder:text-on-surface-variant/50 bg-surface-container-high/50 focus:border-primary focus:ring-1 focus:ring-primary/30"
                            id="password" maxlength="50" minlength="8" name="password" placeholder="••••••••"
                            required="" type="password">
                        <button
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant/50 hover:text-on-surface transition-colors focus:outline-none"
                            onclick="togglePassword()" type="button">
                            <span class="material-symbols-outlined text-[20px]"
                                id="visibility-icon">visibility_off</span>
                        </button>
                    </div>
                </div>
                <div class="pt-4 animate-enter opacity-0 delay-300">
                    <button
                        class="btn-primary w-full py-3 px-4 rounded-lg font-headline-lg-mobile text-[16px] leading-[24px] font-bold flex justify-center items-center gap-2 hover:bg-primary-fixed hover:shadow-primary/20 transition-all duration-300"
                        type="submit">
                        <span class="">Entrar</span>
                        <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
                    </button>
                </div>
            </form>
            <div class="mt-8 pt-6 border-t border-outline-variant/30 text-center animate-enter opacity-0 delay-300">
                <p class="font-body-md text-body-md text-on-surface-variant text-sm text-on-surface-variant/60">
                    Protegido por Fortobs</p>
            </div>
        </div>
    </main>
    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const icon = document.getElementById('visibility-icon');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.textContent = 'visibility';
            } else {
                passwordInput.type = 'password';
                icon.textContent = 'visibility_off';
            }
        }

        const inputs = document.querySelectorAll('.input-field');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.previousElementSibling.classList.add('text-primary-container');
            });
            input.addEventListener('blur', () => {
                input.parentElement.previousElementSibling.classList.remove('text-primary-container');
            });
        });
    </script>
    <script src="/js/login.js"></script>

</body>

</html>
